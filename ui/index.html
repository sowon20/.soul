<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Soul Admin</title>
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Soul Admin</h1>
        <p>저장소와 기본 설정을 관리합니다.</p>
      </header>

      <section class="card">
        <h2>기본 설정</h2>
        <div class="field">
          <label>SOUL_ROOT (읽기 전용)</label>
          <input id="root-path" type="text" readonly />
        </div>
        <div class="field">
          <label>관리 토큰 사용 여부</label>
          <input id="token-enabled" type="text" readonly />
        </div>
      </section>

      <section class="card">
        <h2>Codex 전환</h2>
        <p>작업 전환 체크리스트와 최근 메모리를 확인하세요.</p>
        <a class="link" href="/ui/handoff.html">체크리스트 열기</a>
      </section>

      <section class="card">
        <h2>저장소</h2>
        <form id="store-form" class="row">
          <input id="store-name" placeholder="저장소 이름" />
          <input id="store-folder" placeholder="폴더명 (/soul 아래)" />
          <input id="store-desc" placeholder="설명(선택)" />
          <button type="submit">추가</button>
        </form>
        <div id="store-list" class="list"></div>
      </section>

      <section class="card">
        <h2>연동</h2>
        <div id="integration-list" class="list"></div>
      </section>

      <section class="card">
        <h2>데이터 보기</h2>
        <div class="tabs">
          <button type="button" class="tab active" data-tab="entries">최근 기록</button>
          <button type="button" class="tab" data-tab="memory">요약</button>
          <button type="button" class="tab" data-tab="files">파일</button>
        </div>
        <div id="tab-entries" class="tab-panel active"></div>
        <div id="tab-memory" class="tab-panel"></div>
        <div id="tab-files" class="tab-panel"></div>
      </section>

      <section class="card">
        <h2>인증 관리</h2>
        <form id="cred-form" class="row">
          <input id="cred-filename" placeholder="파일명 (자동)" readonly />
          <select id="cred-type">
            <option value="">인증 종류 선택</option>
            <option value="google-oauth">Google OAuth</option>
            <option value="google-service-account">Google Service Account</option>
            <option value="api-key">API Key</option>
            <option value="other">Other</option>
          </select>
          <input id="cred-label" placeholder="API Key 이름 (예: tuya-access-id)" />
          <input id="cred-note" placeholder="메모 (예: Google Home API)" />
          <input id="cred-file" type="file" />
          <textarea id="cred-text" placeholder="API Key 입력" rows="2"></textarea>
          <button type="submit">업로드</button>
        </form>
        <div id="cred-status" class="hint"></div>
        <div id="cred-list" class="list"></div>
      </section>
    </main>

    <script src="/ui/app.js" type="module"></script>
  </body>
</html>
